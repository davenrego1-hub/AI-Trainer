<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI Trainer</title>
<meta name="theme-color" content="#05070d">
<style>
:root{--bg:#05070d;--panel:#101827;--panel2:#0b1220;--text:#f7fbff;--muted:#8fa3b8;--accent:#00a8ff;--accent2:#00f0ff;--danger:#ff3b3b;--ok:#35e888;--line:#223145}
[data-theme=premium]{--accent:#d9a441;--accent2:#ffd76a}
[data-theme=hardcore]{--accent:#ff3131;--accent2:#ff6b4a}
[data-theme=light]{--bg:#f4f7fb;--panel:#fff;--panel2:#edf2f7;--text:#101827;--muted:#526173;--line:#d8e0ea}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,system-ui,Arial,sans-serif}
.app{max-width:980px;margin:auto;min-height:100vh;padding:18px 14px 92px}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}.brand{font-size:12px;color:var(--accent);letter-spacing:.16em;text-transform:uppercase}.top h1{margin:3px 0 0;font-size:28px}
.card,.metric,.exercise,.day{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:8px;padding:16px;box-shadow:0 12px 30px #0004}
.hero{display:flex;justify-content:space-between;gap:12px;align-items:center}.recovery{border:1px solid var(--accent);color:var(--accent);padding:8px 10px;border-radius:999px;font-weight:800}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:12px 0}.metric span,.muted{color:var(--muted);font-size:13px}.metric strong{display:block;font-size:22px;margin-top:4px}
button,select,input{font:inherit}button{border:0;border-radius:8px;padding:12px 14px;font-weight:800;cursor:pointer}.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#00101a}.ghost{background:transparent;color:var(--text);border:1px solid var(--line)}.danger{background:var(--danger);color:white}
.form{display:grid;gap:12px}.form label{display:grid;gap:6px;color:var(--muted);font-size:13px}input,select{width:100%;border:1px solid var(--line);background:#0002;color:var(--text);border-radius:8px;padding:12px}
.chips{display:flex;gap:8px;flex-wrap:wrap}.chip{border:1px solid var(--line);padding:8px 10px;border-radius:999px;color:var(--muted);cursor:pointer}.chip input{display:none}.chip:has(input:checked){background:var(--accent);color:#00101a;border-color:var(--accent);font-weight:800}
.screen{display:none;gap:14px}.screen.active{display:grid}.section{display:flex;justify-content:space-between;align-items:center;gap:10px}
.exercises{display:grid;gap:12px}.exercise h3{margin:0 0 8px}.tag{display:inline-block;margin:3px 4px 3px 0;padding:5px 8px;border-radius:999px;background:#ffffff12;color:var(--muted);font-size:12px}.gif{height:120px;border-radius:8px;background:repeating-linear-gradient(135deg,#111,#111 12px,#18253a 12px,#18253a 24px);display:grid;place-items:center;color:var(--accent);font-weight:900}
.planner{display:grid;gap:8px}.day{display:flex;justify-content:space-between}.history{display:grid;gap:10px}.chart{width:100%;height:180px;background:#0002;border:1px solid var(--line);border-radius:8px}
.nav{position:fixed;left:0;right:0;bottom:0;background:color-mix(in srgb,var(--bg) 88%,#000);border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(6,1fr);padding:8px;gap:4px}.nav button{background:transparent;color:var(--muted);padding:8px 2px;font-size:11px}.nav button.active{color:var(--accent)}.nav b{display:block;font-size:18px}
@media(min-width:760px){.grid{grid-template-columns:repeat(4,1fr)}.form{grid-template-columns:repeat(2,1fr)}.wide{grid-column:1/-1}.screen{gap:18px}}
</style>
</head>
<body>
<div class="app">
<header class="top"><div><div class="brand">AI Trainer</div><h1 id="title">Home</h1></div><button id="install" class="ghost" hidden>Install</button></header>

<section id="home" class="screen active">
<div class="card hero"><div><p class="muted">Welcome back</p><h2 id="welcome">Athlete</h2></div><div class="recovery" id="recovery">Ready</div></div>
<div class="grid">
<div class="metric"><span>Weight</span><strong id="mWeight">-- kg</strong></div>
<div class="metric"><span>BMI</span><strong id="mBmi">--</strong><span id="mBmiCat">Add profile</span></div>
<div class="metric"><span>Streak</span><strong id="mStreak">0 days</strong></div>
<div class="metric"><span>This week</span><strong id="mWeek">0 workouts</strong></div>
</div>
<div class="card section"><div><p class="brand">Today's workout</p><h2 id="today">Generate your first plan</h2><p class="muted" id="todayMeta">Choose your settings and build a workout.</p></div><button class="primary" onclick="go('workout','Workout')">Generate Workout</button></div>
</section>

<section id="workout" class="screen">
<form id="workoutForm" class="card form">
<label>Goal<select id="goal"><option>Muscle Gain</option><option>Fat Loss</option><option>Strength</option><option>Recomp</option></select></label>
<label>Experience<select id="experience"><option>Beginner</option><option>Intermediate</option><option>Advanced</option></select></label>
<label>Equipment<select id="equipment"><option>Full Gym</option><option>Dumbbells Only</option><option>Home Workout</option></select></label>
<label>Training Days<select id="days"><option>3</option><option selected>4</option><option>5</option><option>6</option></select></label>
<label>Split<select id="split"><option>Push Pull Legs</option><option>Upper Lower</option><option>Bro Split</option><option>Full Body</option></select></label>
<label>Priority Muscle<select id="priority"></select></label>
<div class="wide"><p class="muted">Target Muscles</p><div class="chips" id="targets"></div></div>
<div class="wide"><p class="muted">Advanced Muscles</p><div class="chips" id="advanced"></div></div>
<button class="primary wide">Build AI Workout</button>
</form>
<div class="card"><div class="section"><h2>Weekly Planner</h2><button class="ghost" onclick="exportPlan()">Export PDF</button></div><div id="plan" class="planner"></div></div>
<div id="output" class="exercises"></div>
</section>

<section id="history" class="screen"><div class="section"><h2>Workout History</h2><button class="ghost" onclick="clearHistory()">Clear</button></div><div id="historyList" class="history"></div></section>

<section id="progress" class="screen">
<div class="card form"><label>Current Weight<input id="progressWeight" type="number" step=".1"></label><button class="primary" onclick="addWeight()">Add Weight</button><canvas id="weightChart" class="chart"></canvas></div>
<div class="card form"><label>Bench Press<input id="bench" type="number"></label><label>Squat<input id="squat" type="number"></label><label>Deadlift<input id="deadlift" type="number"></label><button class="ghost wide" onclick="exportProgress()">Export Progress PDF</button><canvas id="prChart" class="chart wide"></canvas></div>
</section>

<section id="profile" class="screen">
<div class="card form">
<label>Name<input id="name"></label><label>Age<input id="age" type="number"></label>
<label>Gender<select id="gender"><option>Male</option><option>Female</option><option>Other</option></select></label>
<label>Height cm<input id="height" type="number"></label><label>Weight kg<input id="weight" type="number" step=".1"></label>
</div>
<div class="card"><h2>Nutrition</h2><div id="nutrition" class="grid"></div></div>
</section>

<section id="settings" class="screen">
<div class="card form"><label>Theme<select id="theme"><option value="default">Default Neon</option><option value="premium">Premium Gym</option><option value="hardcore">Hardcore</option><option value="light">Light</option></select></label><button class="ghost" onclick="demo()">Add Demo Progress</button><button class="danger" onclick="resetApp()">Reset App</button></div>
</section>
</div>

<nav class="nav">
<button class="active" onclick="go('home','Home',this)"><b>⌂</b>Home</button><button onclick="go('workout','Workout',this)"><b>⚡</b>Workout</button><button onclick="go('history','History',this)"><b>☰</b>History</button><button onclick="go('progress','Progress',this)"><b>◌</b>Progress</button><button onclick="go('profile','Profile',this)"><b>◎</b>Profile</button><button onclick="go('settings','Settings',this)"><b>⚙</b>Settings</button>
</nav>

<script>
const muscles=["Chest","Back","Shoulders","Biceps","Triceps","Legs","Abs"];
const adv=["Upper Chest","Lower Chest","Lats","Traps","Rear Delts","Quads","Hamstrings","Calves","Glutes"];
const rules={"Muscle Gain":["4 sets","8-12 reps","60-90 sec rest"],"Fat Loss":["3 sets","15-20 reps","30-45 sec rest"],Strength:["5 sets","3-6 reps","2-3 min rest"],Recomp:["4 sets","8-15 reps","60 sec rest"]};
const names={Chest:["Bench Press","Incline Press","Cable Fly","Dips","Push Up"],Back:["Pull Up","Lat Pulldown","Barbell Row","Seated Row","Deadlift"],Shoulders:["Overhead Press","Lateral Raise","Rear Delt Fly","Arnold Press"],Biceps:["Barbell Curl","Hammer Curl","Preacher Curl"],Triceps:["Rope Pushdown","Skull Crusher","Close Grip Press"],Legs:["Squat","Leg Press","Lunge","Romanian Deadlift","Calf Raise"],Abs:["Plank","Hanging Knee Raise","Cable Crunch","Russian Twist"]};
let S=JSON.parse(localStorage.aiTrainer||"{}");S.profile??={};S.history??=[];S.weights??=[];S.prs??={bench:0,squat:0,deadlift:0};S.theme??="default";S.rot??=0;
function save(){localStorage.aiTrainer=JSON.stringify(S);render()}
function bmi(w,h){if(!w||!h)return["--","Add profile"];let b=w/((h/100)**2),c=b<18.5?"Underweight":b<25?"Normal":b<30?"Overweight":"Obese";return[b.toFixed(1),c]}
function cal(){let p=S.profile;if(!p.weight||!p.height||!p.age)return null;let b=10*p.weight+6.25*p.height-5*p.age+(p.gender==="Female"?-161:5);let goal=document.getElementById("goal").value;let mult=goal==="Fat Loss"?.85:goal==="Muscle Gain"?1.12:1;let c=Math.round(b*1.45*mult);return {c,protein:Math.round(p.weight*2),carbs:Math.round(c*.45/4),fat:Math.round(c*.25/9)}}
function exercises(m,e,d){return Array.from({length: m==="Legs"?40:m==="Back"?30:m==="Chest"?25:m==="Shoulders"||m==="Abs"?20:15},(_,i)=>({id:m+i,name:(names[m]||[m+" Move"])[i%(names[m]||[]).length]+" "+(i+1),muscle:m,subMuscle:adv[i%adv.length],equipment:e,difficulty:d,video:"https://www.youtube.com/results?search_query="+encodeURIComponent(m+" exercise form"),gif:"assets/gifs/placeholder.gif",tips:["Control the tempo","Use full range","Brace your core"],mistakes:["Using momentum","Rushing reps","Losing posture"]}))}
function buildDb(){return muscles.flatMap(m=>exercises(m,"Full Gym","Intermediate").concat(exercises(m,"Dumbbells Only","Beginner")).concat(exercises(m,"Home Workout","Beginner")))}
const DB=buildDb();
function generate(){let goal=val("goal"),eq=val("equipment"),exp=val("experience"),priority=val("priority");let selected=[...document.querySelectorAll(".target:checked")].map(x=>x.value);if(!selected.length)selected=[priority];if(!selected.includes(priority))selected.unshift(priority);let rule=rules[goal],pool=DB.filter(x=>selected.includes(x.muscle)&&x.equipment===eq);S.rot=(S.rot+1)%3;let start=S.rot*5;let picked=pool.slice(start,start+8);if(picked.length<6)picked=pool.slice(0,8);let workout={date:new Date().toLocaleDateString(),goal,complete:false,variant:"Workout "+String.fromCharCode(65+S.rot),exercises:picked.map(x=>({...x,sets:rule[0],reps:rule[1],rest:rule[2]}))};S.history.unshift(workout);S.last=workout;save();renderWorkout(workout);renderPlan()}
function renderWorkout(w=S.last){output.innerHTML=w?`<h2>${w.variant} • ${w.goal}</h2>`+w.exercises.map(e=>`<article class="exercise"><div class="gif">GIF</div><h3>${e.name}</h3><span class="tag">${e.muscle}</span><span class="tag">${e.subMuscle}</span><span class="tag">${e.sets}</span><span class="tag">${e.reps}</span><span class="tag">${e.rest}</span><p><b>Tips:</b> ${e.tips.join(", ")}</p><p><b>Mistakes:</b> ${e.mistakes.join(", ")}</p><button class="ghost" onclick="open('${e.video}')">Video</button></article>`).join(""):""}
function renderPlan(){let split=val("split"),d=+val("days"),arr=split==="Push Pull Legs"?["Push","Pull","Legs","Rest","Push","Pull"]:split==="Upper Lower"?["Upper","Lower","Rest","Upper","Lower","Conditioning"]:split==="Bro Split"?["Chest","Back","Shoulders","Arms","Legs","Abs"]:["Full Body","Rest","Full Body","Rest","Full Body","Mobility"];plan.innerHTML=arr.slice(0,d).map((x,i)=>`<div class="day"><b>Day ${i+1}</b><span>${x}</span></div>`).join("")}
function render(){document.body.dataset.theme=S.theme;theme.value=S.theme;let p=S.profile;welcome.textContent=p.name||"Athlete";mWeight.textContent=p.weight?`${p.weight} kg`:"-- kg";let b=bmi(p.weight,p.height);mBmi.textContent=b[0];mBmiCat.textContent=b[1];mStreak.textContent=(S.streak||0)+" days";let week=S.history.filter(h=>Date.now()-new Date(h.date).getTime()<6048e5).length;mWeek.textContent=week+" workouts";recovery.textContent=week>4?"Recover":"Ready";today.textContent=S.last?`${S.last.variant}: ${S.last.goal}`:"Generate your first plan";todayMeta.textContent=S.last?`${S.last.exercises.length} exercises saved today.`:"Choose your settings and build a workout.";renderHistory();renderNutrition();drawCharts()}
function renderHistory(){historyList.innerHTML=S.history.length?S.history.map((h,i)=>`<div class="card"><div class="section"><b>${h.date}</b><button class="ghost" onclick="S.history[${i}].complete=!S.history[${i}].complete;save()">${h.complete?"Complete":"Mark Done"}</button></div><p>${h.goal} • ${h.variant} • ${h.exercises.length} exercises</p></div>`).join(""):`<div class="card">No workouts yet.</div>`}
function renderNutrition(){let n=cal();nutrition.innerHTML=n?`<div class="metric"><span>Calories</span><strong>${n.c}</strong></div><div class="metric"><span>Protein</span><strong>${n.protein}g</strong></div><div class="metric"><span>Carbs</span><strong>${n.carbs}g</strong></div><div class="metric"><span>Fat</span><strong>${n.fat}g</strong></div>`:"Add age, height, and weight."}
function draw(canvas,vals){let c=canvas.getContext("2d"),w=canvas.width=canvas.clientWidth,h=canvas.height=180;c.clearRect(0,0,w,h);c.strokeStyle=getComputedStyle(document.body).getPropertyValue("--accent");c.lineWidth=3;if(!vals.length)return;c.beginPath();vals.forEach((v,i)=>{let x=i*(w/Math.max(vals.length-1,1)),y=h-20-(v/Math.max(...vals))*130;i?c.lineTo(x,y):c.moveTo(x,y)});c.stroke()}
function drawCharts(){draw(weightChart,S.weights.map(x=>x.value));draw(prChart,[+S.prs.bench||0,+S.prs.squat||0,+S.prs.deadlift||0])}
function val(id){return document.getElementById(id).value}
function go(id,t,btn){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));document.getElementById(id).classList.add("active");title.textContent=t;document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));if(btn)btn.classList.add("active");render()}
function addWeight(){let v=+progressWeight.value;if(v){S.weights.push({date:new Date().toLocaleDateString(),value:v});S.profile.weight=v;save()}}
function exportPlan(){print()}
function exportProgress(){print()}
function clearHistory(){S.history=[];save()}
function resetApp(){if(confirm("Reset AI Trainer?")){localStorage.removeItem("aiTrainer");location.reload()}}
function demo(){S.weights=[82,81.5,80.8,80.2,79.7].map((v,i)=>({date:"Week "+(i+1),value:v}));S.prs={bench:100,squat:140,deadlift:180};save()}
muscles.forEach(m=>{priority.add(new Option(m,m));targets.innerHTML+=`<label class="chip"><input class="target" type="checkbox" value="${m}" ${m==="Chest"?"checked":""}>${m}</label>`});
adv.forEach(m=>advanced.innerHTML+=`<label class="chip"><input type="checkbox" value="${m}">${m}</label>`);
["name","age","gender","height","weight"].forEach(id=>{let el=document.getElementById(id);el.value=S.profile[id]||"";el.oninput=()=>{S.profile[id]=el.type==="number"?+el.value:el.value;save()}});
["bench","squat","deadlift"].forEach(id=>{let el=document.getElementById(id);el.value=S.prs[id]||"";el.oninput=()=>{S.prs[id]=+el.value;save()}});
theme.onchange=()=>{S.theme=theme.value;save()};workoutForm.onsubmit=e=>{e.preventDefault();generate()};renderPlan();render();if("serviceWorker"in navigator)navigator.serviceWorker.register("service-worker.js").catch(()=>{});
</script>
</body>
</html>
